<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Life Simulator</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
  
  <script src="script.js" defer></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-200 flex justify-center items-center min-h-screen m-0">

  <div class="max-w-[400px] w-full h-[100dvh] mx-auto bg-white shadow-2xl flex flex-col relative font-sans overflow-hidden" x-data="gameApp()" x-init="initApp()" x-cloak>

    <div x-show="currentScreen === 'splash'" 
         x-transition:leave="transition ease-in-out duration-700" 
         x-transition:leave-start="opacity-100" 
         x-transition:leave-end="opacity-0" 
         class="absolute inset-0 z-[100] bg-[#0A0A0A] flex items-center justify-center pointer-events-none">
      
      <div class="flex flex-col text-center font-['Black_Ops_One'] leading-tight tracking-widest text-white text-[42px] [-webkit-text-stroke:1.5px_#C83434]">
        <span>YOUR</span>
        <span>LIFE</span>
        <span>SIMULATOR</span>
      </div>
    </div>

    <div x-show="currentScreen === 'mainMenu'" class="w-full h-full flex flex-col bg-[#F5F6F8] absolute inset-0 z-10">
      <header class="bg-[#C83434] py-4 flex justify-center items-center shrink-0 shadow-sm">
        <div class="font-['Black_Ops_One'] text-white text-[15px] tracking-widest uppercase">YOUR LIFE SIMULATOR</div>
      </header>
      
      <div class="flex-1 flex flex-col items-center justify-center px-6 gap-5">
        <h1 class="text-4xl font-black text-[#1a1a1a] mb-6 tracking-tight">Main Menu</h1>
        
        <button @click="currentScreen = 'game'" class="w-full bg-[#4ba351] hover:bg-[#3e8c43] text-white font-black text-xl py-4 rounded-xl shadow-[0_5px_0_#36783a] active:translate-y-[5px] active:shadow-[0_0px_0_#36783a] transition-all">
          Continue Life
        </button>
        
        <button @click="currentScreen = 'create'" class="w-full bg-[#D94E34] hover:bg-[#bd432d] text-white font-black text-xl py-4 rounded-xl shadow-[0_5px_0_#9e3523] active:translate-y-[5px] active:shadow-[0_0px_0_#9e3523] transition-all">
          Start New Life
        </button>
        
        <button @click="currentScreen = 'archivedLives'" class="w-full bg-white hover:bg-gray-50 border-2 border-gray-200 text-[#1a1a1a] font-black text-xl py-4 rounded-xl shadow-[0_5px_0_#d1d5db] active:translate-y-[5px] active:shadow-[0_0px_0_#d1d5db] transition-all mt-2">
          Archived Lives
        </button>
      </div>
    </div>

    <div x-show="currentScreen === 'archivedLives'" class="w-full h-full flex flex-col bg-[#F5F6F8] absolute inset-0 z-10">
      <header class="bg-[#C83434] py-3 px-4 flex items-center shrink-0 shadow-sm">
         <button @click="currentScreen = 'mainMenu'" class="w-7 h-7 rounded-full border border-white flex items-center justify-center text-white text-xs font-bold cursor-pointer shrink-0 mr-4">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="font-['Black_Ops_One'] text-white text-[15px] tracking-widest uppercase">Archived Lives</div>
      </header>
      
      <div class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-3 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
         <template x-if="archivedLives.length === 0">
            <div class="flex flex-col items-center justify-center mt-12 opacity-50">
                <i class="fa-solid fa-box-archive text-5xl text-gray-400 mb-3"></i>
                <p class="text-center text-gray-500 font-bold">No saved lives yet.</p>
            </div>
         </template>
         <template x-for="life in archivedLives" :key="life.date + life.name">
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 flex justify-between items-center hover:border-gray-300 transition-colors cursor-pointer">
                <div class="flex items-center gap-3">
                    <span class="text-[32px] leading-none" x-text="life.emoji"></span>
                    <div class="flex flex-col">
                        <span class="font-black text-gray-800 text-[15px]" x-text="life.name"></span>
                        <span class="font-bold text-gray-500 text-[11px]" x-text="`Saved at Age ${life.age}`"></span>
                    </div>
                </div>
                <span class="text-[10px] font-bold text-gray-400" x-text="life.date"></span>
            </div>
         </template>
      </div>
    </div>

    <div x-show="currentScreen === 'create'" class="w-full h-full flex flex-col bg-[#F5F6F8] absolute inset-0 z-10">
      
      <header class="bg-[#C83434] px-4 py-2 flex items-center gap-3 shrink-0 shadow-sm relative z-20">
        <button @click="currentScreen = 'mainMenu'" class="w-7 h-7 rounded-full border border-white flex items-center justify-center text-white text-xs font-bold cursor-pointer shrink-0 z-10">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="flex flex-col font-['Black_Ops_One'] leading-[1.1] tracking-widest text-white text-[11px] pointer-events-none">
          <span>YOUR LIFE</span>
          <span>SIMULATOR</span>
        </div>
      </header>

      <div class="flex-1 overflow-y-auto px-4 py-3 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none] flex flex-col gap-1.5">
        <h1 class="text-center text-xl font-black text-gray-900 mb-1 tracking-tight">New Life</h1>

        <div @click="openModal('name')" class="bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-1.5 flex justify-between items-center cursor-pointer hover:border-gray-300 transition-colors">
          <div class="flex flex-col">
            <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Name</span>
            <span class="text-[14px] font-black text-gray-900" x-text="character.name"></span>
          </div>
          <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
        </div>
        
        <div @click="openModal('gender')" class="bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-1.5 flex justify-between items-center cursor-pointer hover:border-gray-300 transition-colors">
          <div class="flex flex-col">
            <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Gender</span>
            <span class="text-[14px] font-black text-gray-900"><span x-text="character.emoji"></span> <span x-text="character.gender"></span></span>
          </div>
          <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
        </div>
        
        <div @click="openModal('country')" class="bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-1.5 flex justify-between items-center cursor-pointer hover:border-gray-300 transition-colors">
          <div class="flex flex-col">
            <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Country</span>
            <span class="text-[14px] font-black text-gray-900"><i class="fa-solid fa-earth-americas text-green-600 mr-1 text-xs"></i> <span x-text="character.country"></span></span>
          </div>
          <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
        </div>

        <div @click="openModal('appearance')" class="bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-1.5 flex justify-between items-center cursor-pointer hover:border-gray-300 transition-colors">
          <div class="flex flex-col">
            <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Appearance</span>
            <span class="text-[14px] font-black text-gray-900" x-text="character.appearance"></span>
          </div>
          <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
        </div>

        <div @click="openModal('talent')" class="bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-1.5 flex justify-between items-center cursor-pointer hover:border-gray-300 transition-colors">
          <div class="flex flex-col">
            <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Inner Talent</span>
            <span class="text-[14px] font-black text-[#C83434]" x-text="character.talent"></span>
          </div>
          <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
        </div>
        
        <div @click="openModal('personality')" class="bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-1.5 flex justify-between items-center cursor-pointer hover:border-gray-300 transition-colors">
          <div class="flex flex-col">
            <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Personality & Stats</span>
            <span class="text-[13px] font-black text-[#205295]">Adjust Levels <i class="fa-solid fa-sliders text-[10px] ml-1"></i></span>
          </div>
          <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
        </div>

        <div @click="openModal('family')" class="bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-1.5 flex justify-between items-center cursor-pointer hover:border-gray-300 transition-colors">
          <div class="flex flex-col">
            <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Family Status</span>
            <span class="text-[14px] font-black text-gray-900">🏠 <span x-text="character.family"></span></span>
          </div>
          <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
        </div>
      </div>

      <div class="p-3 flex flex-col gap-2 shrink-0 border-t border-gray-200 bg-white shadow-[0_-4px_10px_rgba(0,0,0,0.02)]">
        <button @click="randomizeCharacter" class="w-full py-2 bg-gray-100 hover:bg-gray-200 rounded-xl text-gray-700 font-bold text-[13px] transition-colors cursor-pointer">
          Randomize Attributes
        </button>
        <button @click="startGame" class="w-full py-2.5 bg-[#C83434] hover:bg-[#a82929] rounded-xl text-white font-black text-[15px] tracking-widest transition-transform active:scale-[0.98] shadow-md cursor-pointer">
          START LIFE
        </button>
      </div>
    </div>


    <div x-show="currentScreen === 'game'" class="w-full h-full flex flex-col z-0 relative">
      
      <header class="bg-[#C83434] px-4 py-2 flex items-center gap-3 shrink-0 relative z-20 shadow-sm">
        <button @click="isLeftMenuOpen = true" class="w-8 h-8 rounded-full border-2 border-white flex items-center justify-center text-white text-xl font-bold cursor-pointer shrink-0 z-10">
          <i class="fa-solid fa-bars text-lg"></i>
        </button>
        <div class="flex flex-col font-['Black_Ops_One'] leading-[1.05] tracking-widest text-white text-[10px] z-10 pointer-events-none">
          <span>YOUR</span>
          <span>LIFE</span>
          <span>SIMULATOR</span>
        </div>
      </header>

      <div class="px-1 py-1 border-b border-gray-200 flex items-center shrink-0 bg-white relative z-20 shadow-sm">
        <div class="flex items-center gap-1">
          <div class="flex items-center justify-center text-[40px] leading-none transition-all duration-300 transform">
            <span x-text="character.emoji"></span>
          </div>
          <div class="flex flex-col gap-0.5">
            <div class="flex items-center gap-2">
              <span class="text-lg leading-none" x-text="character.countryFlag"></span>
              <h2 class="text-[14px] font-black text-black leading-none" x-text="character.name"></h2>
              <button @click="openModal('profile')" class="w-6 h-6 rounded-full border border-gray-300 flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors cursor-pointer ml-1">
                <i class="fa-solid fa-ellipsis text-xs"></i>
              </button>
            </div>
            <div class="flex items-center gap-1.5 mt-0">
              <i class="fa-solid fa-sack-dollar text-gray-400 text-xs"></i>
              <span class="text-[11px] font-bold text-gray-500 leading-none transition-all" x-text="getCurrentStatus()"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="flex-1 min-h-0 bg-[#F5F6F8] relative flex flex-col overflow-hidden z-10">
        <div class="flex-1 overflow-y-auto p-4 pb-24 flex flex-col gap-1 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]" x-ref="logScroll">
          <template x-for="log in eventLog" :key="log.id">
            <div class="w-full flex flex-col">
              <template x-if="log.type === 'divider'">
                <div class="flex justify-center my-3">
                  <span class="bg-[#E4E6EA] text-gray-500 text-[8px] font-black tracking-widest px-2 py-1 rounded-full uppercase shadow-sm border border-gray-200" x-text="log.text"></span>
                </div>
              </template>
              <template x-if="log.type === 'event'">
                <div class="flex justify-start mb-1 pr-12">
                  <div class="bg-white text-gray-800 text-[9px] font-semibold px-4 py-2.5 rounded-2xl rounded-tl-sm shadow-sm border border-gray-100 leading-snug">
                    <span x-html="log.text"></span>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>

        <button @click="isDrawerOpen = true" class="absolute right-0 top-1/3 bg-white hover:bg-gray-50 text-gray-600 px-1 py-4 rounded-l-lg shadow-md border border-r-0 border-gray-200 transition-colors z-20">
          <i class="fa-solid fa-chevron-left text-sm"></i>
        </button>

        <div class="absolute bottom-3 left-0 right-0 flex justify-center items-center pointer-events-none z-20">
          
          <div class="pointer-events-auto bg-[#429546] text-white rounded-full shadow-[0_4px_10px_rgba(66,149,70,0.4)] flex items-center overflow-hidden border border-[#367d3a]">
            
            <button @click="previousYear" :class="age > 0 ? 'opacity-100 hover:bg-[#367d3a] cursor-pointer' : 'opacity-50 pointer-events-none'" class="px-5 py-2.5 transition-colors active:bg-[#2b632e]">
              <i class="fa-solid fa-minus text-sm"></i>
            </button>
            
            <div class="px-5 py-2.5 font-black text-[14px] tracking-widest border-x border-[#367d3a] select-none flex items-center justify-center min-w-[90px]">
              AGE
            </div>

            <button @click="advanceYear" class="px-5 py-2.5 hover:bg-[#367d3a] transition-colors active:bg-[#2b632e] cursor-pointer">
              <i class="fa-solid fa-plus text-sm"></i>
            </button>
            
          </div>

        </div>

        <div class="absolute inset-0 z-50 pointer-events-none flex justify-end" :class="isDrawerOpen ? 'pointer-events-auto' : ''">
          <div class="absolute inset-0 bg-black/40 transition-opacity duration-300" x-show="isDrawerOpen" x-transition.opacity @click="isDrawerOpen = false"></div>
          
          <div class="w-[90px] h-full bg-white shadow-[[-10px_0_20px_rgba(0,0,0,0.1)]] relative flex flex-col transform transition-transform duration-300 ease-in-out py-6" :class="isDrawerOpen ? 'translate-x-0' : 'translate-x-full'">
            <div class="flex-1 overflow-y-auto flex flex-col items-center gap-6 pb-10 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
              <template x-for="stat in detailedStats" :key="stat.name">
                <div class="flex flex-col items-center gap-1">
                  <div class="relative w-12 h-12 flex items-center justify-center shrink-0 mb-1">
                    <svg class="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                      <path class="text-gray-200" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                      <path class="transition-all duration-700 ease-out" stroke-width="3" :stroke="getRingColor(stat.value)" stroke-dasharray="100, 100" :stroke-dashoffset="100 - stat.value" stroke-linecap="round" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="w-9 h-9 bg-[#242A38] rounded-full flex items-center justify-center text-white text-md z-10 shadow-sm">
                      <span x-html="stat.icon"></span>
                    </div>
                  </div>
                  <div class="flex flex-col items-center leading-tight">
                    <span class="text-[9px] font-bold text-gray-500 uppercase tracking-wider" x-text="stat.name"></span>
                    <span class="text-[11px] font-black transition-colors duration-700" :style="`color: ${getRingColor(stat.value)}`" x-text="`${stat.value}%`"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
      
      <div class="bg-black grid grid-cols-4 shrink-0 z-20 mb-4 mx-1 rounded-2xl overflow-hidden divide-x divide-gray-800 shadow-lg bg-opacity-95 backdrop-blur-sm">
        <button @click="activeDepartment = 'career'" class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
          <i class="fa-solid fa-briefcase text-xl"></i>
          <span class="text-[8px] font-bold tracking-wide mt-1">CAREER</span>
        </button>
        <button @click="activeDepartment = 'wealth'" class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
          <i class="fa-solid fa-coins text-xl"></i>
          <span class="text-[8px] font-bold tracking-wide mt-1">WEALTH</span>
        </button>
        <button @click="activeDepartment = 'social'" class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
          <i class="fa-solid fa-heart text-xl"></i>
          <span class="text-[8px] font-bold tracking-wide mt-1">SOCIAL</span>
        </button>
        <button @click="activeDepartment = 'more'" class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
          <i class="fa-solid fa-bars text-xl"></i>
          <span class="text-[8px] font-bold tracking-wide mt-1">MORE</span>
        </button>
      </div>

      <div x-show="activeDepartment !== null" 
           x-transition:enter="transition ease-out duration-300" 
           x-transition:enter-start="translate-y-full" 
           x-transition:enter-end="translate-y-0" 
           x-transition:leave="transition ease-in duration-200" 
           x-transition:leave-start="translate-y-0" 
           x-transition:leave-end="translate-y-full" 
           class="absolute inset-0 z-[70] bg-[#F5F6F8] flex flex-col">
        
        <header class="bg-[#C83434] px-4 py-3 flex items-center justify-between shrink-0 shadow-sm relative z-20">
          <button @click="activeDepartment = null" class="w-8 h-8 rounded-full border-2 border-white flex items-center justify-center text-white text-sm font-bold cursor-pointer shrink-0 transition-transform active:scale-90 shadow-sm relative z-10">
            <i class="fa-solid fa-arrow-down"></i>
          </button>
          
          <div class="absolute inset-0 flex items-center justify-center gap-2 text-white pointer-events-none">
            <span class="text-[22px] leading-none drop-shadow-md" x-text="character.emoji"></span>
            <h2 class="text-[16px] font-black leading-none tracking-wide drop-shadow-sm" x-text="character.name"></h2>
          </div>
          
          <div class="w-8 h-8 relative z-10"></div> 
        </header>

        <div class="w-full flex justify-center items-center py-4 bg-white border-b border-gray-200 shadow-sm shrink-0">
          <h1 class="text-xl font-['Black_Ops_One'] text-gray-800 tracking-widest uppercase" x-text="activeDepartment"></h1>
        </div>

        <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">
          <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 flex flex-col items-center justify-center gap-3 mt-4">
            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 text-2xl">
              <i class="fa-solid fa-hammer"></i>
            </div>
            <p class="text-gray-500 font-bold text-sm text-center">Content for <span class="uppercase text-[#C83434]" x-text="activeDepartment"></span> is ready to be built!</p>
          </div>
        </div>
      </div>

    </div>

    <div class="absolute inset-0 z-[60] pointer-events-none" :class="isLeftMenuOpen ? 'pointer-events-auto' : ''">
      <div class="absolute inset-0 bg-black/60 transition-opacity duration-300" x-show="isLeftMenuOpen" x-transition.opacity @click="isLeftMenuOpen = false"></div>
      
      <div class="absolute top-0 left-0 w-[80%] max-w-[300px] h-full bg-white shadow-2xl flex flex-col transform transition-transform duration-300 ease-in-out" :class="isLeftMenuOpen ? 'translate-x-0' : '-translate-x-full'">
        
        <div class="bg-[#C83434] p-6 flex flex-col justify-center shadow-inner">
            <h2 class="font-['Black_Ops_One'] text-white text-[22px] leading-tight tracking-widest">YOUR<br>LIFE<br>SIMULATOR</h2>
        </div>

        <div class="flex flex-col py-4 flex-1">
            <button @click="isLeftMenuOpen = false" class="px-6 py-4 text-left font-bold text-gray-800 hover:bg-gray-100 flex items-center gap-4 transition-colors">
              <i class="fa-solid fa-play text-[#C83434] text-lg w-5 text-center"></i> Resume Game
            </button>
            <button @click="saveAndNewLife" class="px-6 py-4 text-left font-bold text-gray-800 hover:bg-gray-100 flex items-center gap-4 transition-colors">
              <i class="fa-solid fa-floppy-disk text-[#C83434] text-lg w-5 text-center"></i> Save & Start New Life
            </button>
            <button class="px-6 py-4 text-left font-bold text-gray-800 hover:bg-gray-100 flex items-center gap-4 transition-colors">
              <i class="fa-solid fa-gear text-[#C83434] text-lg w-5 text-center"></i> Settings
            </button>
        </div>
        
        <div class="flex flex-col py-4 border-t border-gray-200">
            <button @click="isLeftMenuOpen = false" class="px-6 py-4 text-left font-bold text-gray-800 hover:bg-gray-100 flex items-center gap-4 transition-colors">
              <i class="fa-solid fa-power-off text-[#C83434] text-lg w-5 text-center"></i> Quit Game
            </button>
        </div>
      </div>
    </div>


    <div class="absolute inset-0 z-[80] flex items-center justify-center p-5 pointer-events-none" :class="activeModal !== null ? 'pointer-events-auto' : ''">
      <div class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm transition-opacity duration-300" x-show="activeModal !== null" x-transition.opacity @click="activeModal = null"></div>
      
      <div class="relative w-full max-w-[310px] bg-white rounded-[24px] shadow-[0_20px_50px_rgba(0,0,0,0.15)] flex flex-col transform transition-all duration-300 border border-gray-100" 
           x-show="activeModal !== null" 
           x-transition:enter="transition ease-out duration-200" 
           x-transition:enter-start="scale-95 opacity-0 translate-y-4" 
           x-transition:enter-end="scale-100 opacity-100 translate-y-0" 
           x-transition:leave="transition ease-in duration-150" 
           x-transition:leave-start="scale-100 opacity-100 translate-y-0" 
           x-transition:leave-end="scale-95 opacity-0 translate-y-4">
        
        <button @click="activeModal = null" class="absolute top-4 right-4 w-7 h-7 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center text-gray-500 hover:text-gray-800 transition-colors z-20">
          <i class="fa-solid fa-xmark text-sm"></i>
        </button>

        <div class="w-full flex flex-col justify-center items-start px-5 pt-5 pb-1">
          <h2 class="text-gray-900 font-black uppercase text-[16px] tracking-wide" x-text="activeModal"></h2>
          <p class="font-bold text-gray-400 text-[10px] uppercase tracking-wider mt-0.5" x-text="getModalSubheading()"></p>
        </div>

        <div class="px-5 pb-5 pt-2 overflow-y-auto max-h-[65vh] [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]">

          <template x-if="activeModal === 'name'">
            <div class="flex flex-col gap-2">
              <div class="flex flex-col gap-1">
                <input type="text" x-model="tempFirstName" class="w-full border border-gray-200 rounded-xl px-4 py-2 bg-gray-50 focus:bg-white text-[15px] font-bold text-gray-800 focus:outline-none focus:border-[#C83434] focus:ring-2 focus:ring-[#C83434]/20 transition-all" placeholder="First Name">
              </div>
              <div class="flex flex-col gap-1">
                <input type="text" x-model="tempLastName" class="w-full border border-gray-200 rounded-xl px-4 py-2 bg-gray-50 focus:bg-white text-[15px] font-bold text-gray-800 focus:outline-none focus:border-[#C83434] focus:ring-2 focus:ring-[#C83434]/20 transition-all" placeholder="Last Name">
              </div>
              <button @click="saveName" class="w-full py-2.5 bg-[#C83434] hover:bg-[#a82929] rounded-xl text-white font-bold text-[13px] transition-colors shadow-lg shadow-[#C83434]/30 mt-1">
                Save Details
              </button>
            </div>
          </template>

          <template x-if="activeModal === 'personality'">
            <div class="flex flex-col gap-2.5">
              <template x-for="stat in detailedStats" :key="stat.name">
                <div class="flex flex-col gap-1.5 bg-gray-50 px-3 py-2.5 rounded-2xl border border-gray-100 shadow-sm">
                  <div class="flex justify-between items-end text-[11px] font-black text-gray-700 uppercase tracking-wide leading-none mb-0.5">
                    <div class="flex items-center gap-2">
                      <div class="w-4 text-center text-[#242A38] text-[11px]" x-html="stat.icon"></div>
                      <span x-text="stat.name"></span>
                    </div>
                    <span :style="`color: ${getRingColor(stat.value)}`" x-text="`${stat.value}%`"></span>
                  </div>
                  <input type="range" min="0" max="100" x-model.number="stat.value" class="w-full accent-[#C83434] cursor-pointer">
                </div>
              </template>
              <button @click="activeModal = null" class="w-full py-2.5 bg-[#C83434] hover:bg-[#a82929] rounded-xl text-white font-bold text-[13px] transition-colors shadow-lg shadow-[#C83434]/30 mt-1">
                Apply Attributes
              </button>
            </div>
          </template>

          <template x-if="activeModal === 'profile'">
            <div class="flex flex-col gap-3">
              <div class="flex justify-between items-center bg-gray-50 px-4 py-3 rounded-xl border border-gray-100 shadow-sm">
                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Bank Balance</span>
                <span class="text-[13px] font-black text-[#4ade80]" x-text="formatMoney(character.balance, character.country)"></span>
              </div>
              
              <div class="bg-gray-50 rounded-xl border border-gray-100 shadow-sm p-4 flex flex-col gap-2.5">
                <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Name</span> <span class="text-[12px] font-bold text-gray-800" x-text="character.name"></span></div>
                <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Gender</span> <span class="text-[12px] font-bold text-gray-800" x-text="character.gender"></span></div>
                <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Birthday</span> <span class="text-[12px] font-bold text-gray-800" x-text="character.birthday"></span></div>
                <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Country</span> <span class="text-[12px] font-bold text-gray-800" x-text="`${character.countryFlag} ${character.country}`"></span></div>
                <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Family</span> <span class="text-[12px] font-bold text-gray-800" x-text="character.family"></span></div>
                
                <hr class="border-gray-200 my-0.5">
                
                <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Father</span> <span class="text-[12px] font-bold text-gray-800" x-text="character.father"></span></div>
                <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Mother</span> <span class="text-[12px] font-bold text-gray-800" x-text="character.mother"></span></div>
                
                <hr class="border-gray-200 my-0.5">
                
                <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Diseases</span> <span class="text-[12px] font-bold text-[#C83434]" x-text="character.diseases.length > 0 ? character.diseases.join(', ') : 'None'"></span></div>
              </div>
            </div>
          </template>

          <template x-if="activeModal !== 'name' && activeModal !== 'personality' && activeModal !== 'profile' && activeModal !== null">
            <div class="flex flex-col gap-2">
              <template x-for="item in getActiveList()" :key="item.label">
                <button @click="selectOption(activeModal, item.label, item.emoji)" class="w-full text-left px-4 py-2.5 bg-white hover:border-gray-300 border border-gray-200 rounded-xl flex items-center justify-between shadow-sm active:scale-[0.98] transition-all">
                  <div class="flex items-center gap-3">
                    <span class="text-[18px] w-5 text-center" x-text="item.emoji"></span>
                    <div class="flex flex-col">
                      <span class="font-bold text-gray-800 text-[13px]" x-text="item.label"></span>
                      <template x-if="activeModal === 'family'">
                        <span class="text-[9px] font-bold text-gray-400 mt-0.5 leading-tight" x-text="item.min === 0 ? 'Start with zero funds' : `Start with ${formatMoney(item.min, character.country)} - ${formatMoney(item.max, character.country)}`"></span>
                      </template>
                    </div>
                  </div>
                  <i class="fa-solid fa-chevron-right text-gray-300 text-[11px]"></i>
                </button>
              </template>
            </div>
          </template>

        </div>
      </div>
    </div>

  </div>

</body>
</html>
