<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Life Simulator</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <script src="script.js" defer></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style> [x-cloak] { display: none !important; } </style>
</head>
<body class="bg-gray-200 flex justify-center items-center min-h-screen m-0">

  <div class="max-w-[400px] w-full h-[100dvh] mx-auto bg-white shadow-2xl flex flex-col relative font-sans overflow-hidden" x-data="gameApp()" x-cloak>

    <header class="bg-[#C83434] px-2 py-2 flex items-center gap-3 shrink-0 relative z-20">
      <button class="w-8 h-8 rounded-full border-2 border-white flex items-center justify-center text-white text-xl font-bold cursor-pointer shrink-0">
        <i class="fa-solid fa-bars text-lg"></i>
      </button>
      <div class="flex flex-col text-[#FFCC00] font-black text-[10px] leading-tight tracking-wider text-left">
        <span>YOUR</span>
        <span>LIFE</span>
        <span>SIMULATOR</span>
      </div>
    </header>

    <div class="px-2 py-1 border-b border-gray-200 flex items-center shrink-0 bg-white relative z-20 shadow-sm">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-[#EBE7DF] rounded-2xl flex items-center justify-center text-2xl text-gray-600 shadow-sm border border-gray-100">
          <i class="fa-solid fa-user-tie"></i>
        </div>
        <div class="flex flex-col gap-0.5">
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-flag text-green-600 text-sm"></i>
            <h2 class="text-[12px] font-bold text-[#205295] underline decoration-2 underline-offset-2 leading-none">
              Jack Misano
            </h2>
            <button class="w-6 h-6 rounded-full border border-gray-300 flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors cursor-pointer ml-1">
              <i class="fa-solid fa-ellipsis text-xs"></i>
            </button>
          </div>
          <div class="flex items-center gap-1.5 mt-1">
            <i class="fa-solid fa-sack-dollar text-[#205295] text-xs"></i>
            <span class="text-[10px] font-bold text-[#205295] leading-none">Working Class</span>
          </div>
        </div>
      </div>
    </div>

    <div class="flex-1 min-h-0 bg-white relative flex flex-col overflow-hidden z-10">
      
      <div class="log-container flex-1 overflow-y-auto p-4 pb-24 flex flex-col gap-3" x-ref="logScroll">
        <template x-for="log in eventLog" :key="log.id">
          <p class="text-[12px] font-semibold text-gray-800" x-html="log.text"></p>
        </template>
      </div>

      <button @click="isDrawerOpen = true" class="absolute right-0 top-1/3 bg-gray-200 hover:bg-gray-300 text-gray-600 px-1 py-4 rounded-l-lg shadow-md border border-r-0 border-gray-300 transition-colors z-20">
        <i class="fa-solid fa-chevron-left text-sm"></i>
      </button>

      <div class="absolute bottom-3 left-0 right-0 flex justify-center pointer-events-none z-20">
        <button @click="advanceYear" class="pointer-events-auto bg-[#429546] hover:bg-[#367d3a] text-white font-bold text-[15px] py-2 px-6 rounded-full shadow-[0_4px_10px_rgba(0,0,0,0.3)] tracking-wider transition-transform active:scale-95 flex items-center gap-2 cursor-pointer">
          ADVANCE YEAR <i class="fa-solid fa-angles-right text-sm"></i>
        </button>
      </div>

      <div class="absolute inset-0 z-50 pointer-events-none flex justify-end" :class="isDrawerOpen ? 'pointer-events-auto' : ''">
        <div class="absolute inset-0 bg-black/40 transition-opacity duration-300" x-show="isDrawerOpen" x-transition.opacity @click="isDrawerOpen = false"></div>
        
        <div class="w-[90px] h-full bg-white shadow-[[-10px_0_20px_rgba(0,0,0,0.1)]] relative flex flex-col transform transition-transform duration-300 ease-in-out py-6" :class="isDrawerOpen ? 'translate-x-0' : 'translate-x-full'">
          
          <div class="flex-1 overflow-y-auto flex flex-col items-center gap-6 pb-10">
            <template x-for="stat in detailedStats" :key="stat.name">
              
              <div class="flex flex-col items-center gap-1">
                
                <div class="relative w-12 h-12 flex items-center justify-center shrink-0 mb-1">
                  
                  <svg class="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                    <path class="text-gray-200" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    
                    <path class="transition-all duration-700 ease-out" 
                          stroke-width="3" 
                          :stroke="getRingColor(stat.value)" 
                          stroke-dasharray="100, 100" 
                          :stroke-dashoffset="100 - stat.value" 
                          stroke-linecap="round" 
                          fill="none" 
                          d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                  </svg>
                  
                  <div class="w-12 h-12 bg-[#242A38] rounded-full flex items-center justify-center text-white text-md z-10 shadow-sm">
                    <span x-html="stat.icon"></span>
                  </div>
                </div>
                
                <div class="flex flex-col items-center leading-tight">
                  <span class="text-[9px] font-bold text-gray-500 uppercase tracking-wider" x-text="stat.name"></span>
                  <span class="text-[11px] font-black transition-colors duration-700" :style="`color: ${getRingColor(stat.value)}`" x-text="`${stat.value}%`"></span>
                </div>
                
              </div>

            </template>
          </div>
        </div>
      </div>
      </div>
    <div class="bg-black grid grid-cols-4 shrink-0 z-20 border-t border-gray-800 divide-x divide-gray-800">
      <button class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
        <i class="fa-solid fa-briefcase text-xl"></i>
        <span class="text-[8px] font-bold tracking-wide mt-1">CAREER</span>
      </button>
      <button class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
        <i class="fa-solid fa-coins text-xl"></i>
        <span class="text-[8px] font-bold tracking-wide mt-1">WEALTH</span>
      </button>
      <button class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
        <i class="fa-solid fa-heart text-xl"></i>
        <span class="text-[8px] font-bold tracking-wide mt-1">SOCIAL</span>
      </button>
      <button class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
        <i class="fa-solid fa-bars text-xl"></i>
        <span class="text-[8px] font-bold tracking-wide mt-1">MORE</span>
      </button>
    </div>

  </div>

</body>
</html>
