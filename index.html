<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Life Simulator</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="style.css">
  
  <script src="script.js" defer></script>
  
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-200 flex justify-center items-center min-h-screen m-0">

  <div class="max-w-[400px] w-full h-[100dvh] mx-auto bg-white shadow-2xl flex flex-col relative font-sans overflow-hidden" x-data="gameApp()">

    <header class="bg-[#C83434] px-3 py-2 flex items-center gap-3 shrink-0">
      <button class="w-10 h-10 rounded-full border-2 border-white flex items-center justify-center text-white text-xl font-bold cursor-pointer shrink-0">
        <i class="fa-solid fa-bars text-lg"></i>
      </button>
      <div class="flex flex-col text-[#FFCC00] font-black text-[11px] leading-tight tracking-wider text-left">
        <span>YOUR</span>
        <span>LIFE</span>
        <span>SIMULATOR</span>
      </div>
    </header>

    <div class="px-2 py-1 border-b border-gray-200 flex items-center shrink-0 bg-white">
      <div class="flex items-center gap-3">
        
        <div class="w-12 h-12 bg-[#EBE7DF] rounded-2xl flex items-center justify-center text-2xl text-gray-600 shadow-sm border border-gray-100">
          <i class="fa-solid fa-user-tie"></i>
        </div>
        
        <div class="flex flex-col gap-0.2">
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-flag text-green-600 text-sm"></i>
            <h2 class="text-[12px] font-bold text-[#205295] underline decoration-2 underline-offset-2 leading-none">
              Jack Misano
            </h2>
            <button class="w-6 h-6 rounded-full border border-gray-300 flex items-center justify-center text-gray-500 hover:bg-gray-100 transition-colors cursor-pointer ml-1">
              <i class="fa-solid fa-ellipsis text-xs"></i>
            </button>
          </div>
          
          <div class="flex items-center gap-1.5 mt-1">
            <i class="fa-solid fa-sack-dollar text-[#205295] text-xs"></i>
            <span class="text-[10px] font-bold text-[#205295] leading-none">
              Working Class
            </span>
          </div>
        </div>

      </div>
    </div>

    <div class="flex-1 min-h-0 bg-white relative flex flex-col overflow-hidden">
      
      <div class="log-container flex-1 overflow-y-auto p-4 pb-24 flex flex-col gap-3" x-ref="logScroll">
        <template x-for="log in eventLog" :key="log.id">
          <p class="text-[12px] font-semibold text-gray-800" x-html="log.text"></p>
        </template>
      </div>

      <div class="absolute bottom-3 left-0 right-0 flex justify-center pointer-events-none z-20">
        <button @click="advanceYear" class="pointer-events-auto bg-[#429546] hover:bg-[#367d3a] text-white font-bold text-[15px] py-2 px-2 rounded-full shadow-[0_4px_10px_rgba(0,0,0,0.3)] tracking-wider transition-transform active:scale-95 flex items-center gap-2 cursor-pointer">
          ADVANCE YEAR <i class="fa-solid fa-angles-right text-sm"></i>
        </button>
      </div>

    </div>

    <div class="bg-black grid grid-cols-4 shrink-0 z-6 border-t border-gray-800 divide-x divide-gray-800">
      <button class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
        <i class="fa-solid fa-briefcase text-xl"></i>
        <span class="text-[8px] font-bold tracking-wide mt-1">CAREER</span>
      </button>
      <button class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
        <i class="fa-solid fa-coins text-xl"></i>
        <span class="text-[8px] font-bold tracking-wide mt-1">WEALTH</span>
      </button>
      <button class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
        <i class="fa-solid fa-heart text-xl"></i>
        <span class="text-[8px] font-bold tracking-wide mt-1">SOCIAL</span>
      </button>
      <button class="flex flex-col items-center justify-center py-1 gap-1 text-white hover:text-gray-300 transition-colors cursor-pointer">
        <i class="fa-solid fa-bars text-xl"></i>
        <span class="text-[8px] font-bold tracking-wide mt-1">MORE</span>
      </button>
    </div>

    <div class="bg-[#F3F4F6] p-3 flex flex-col gap-2 shrink-0 z-10 border-t border-gray-200">
      <template x-for="stat in stats" :key="stat.name">
        <div class="flex items-center text-sm font-bold text-gray-800">
          <div class="w-[100px] flex justify-between items-center pr-1">
            <span x-text="stat.name"></span>
            <span x-html="stat.icon"></span>
          </div>
          <div class="flex-1 bg-[#E5E7EB] h-4 rounded overflow-hidden">
            <div class="h-full flex items-center justify-end pr-2 text-white text-[9px] transition-all duration-300"
                 :class="stat.colorClass"
                 :style="`width: ${stat.value}%`"
                 x-text="`${stat.value}%`">
            </div>
          </div>
        </div>
      </template>
    </div>

  </div>

</body>
</html>
